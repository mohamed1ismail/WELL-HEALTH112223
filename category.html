<script>
let currentLang = localStorage.getItem('lang') || 'ar';

const CATS = {
  all:        { ar:'الكل',         en:'All',        emoji:'🍽️', img:'' },
  grill:      { ar:'المشويات',     en:'Grills',     emoji:'🔥', img:'https://lh3.googleusercontent.com/aida-public/AB6AXuAuxoBdzU97kF_yx9SlgJAj4sAOI6RvhFTVzs8QKFLgYinjGHE5kQApbcI2I5IfbYd9yy9nFablU1JKUnnbWty5Ke4IqvtqJyV_z45nKqqOChxJhr6oaeQah9qwB5PjexURegLJHR_HKPDn-oVa4cyDX3mdoOzJjbb6jjgg8wr_EPFL8xftYYnD_pLF5LQmZNQsF8gP_PboJglEDolVi3PVgWl9JSNhP62SwlKpXmdWRQbJ0vPL49lFpdqgC0U1VViNmPx7jKCgL4If' },
  sandwiches: { ar:'الساندوتشات',  en:'Sandwiches',  emoji:'🥪', img:'https://lh3.googleusercontent.com/aida-public/AB6AXuAuxoBdzU97kF_yx9SlgJAj4sAOI6RvhFTVzs8QKFLgYinjGHE5kQApbcI2I5IfbYd9yy9nFablU1JKUnnbWty5Ke4IqvtqJyV_z45nKqqOChxJhr6oaeQah9qwB5PjexURegLJHR_HKPDn-oVa4cyDX3mdoOzJjbb6jjgg8wr_EPFL8xftYYnD_pLF5LQmZNQsF8gP_PboJglEDolVi3PVgWl9JSNhP62SwlKpXmdWRQbJ0vPL49lFpdqgC0U1VViNmPx7jKCgL4If' },
  appetizers: { ar:'المقبلات',     en:'Appetizers',  emoji:'🥗', img:'https://lh3.googleusercontent.com/aida-public/AB6AXuB9kGszg_KIa6G0RVhPjAxaua5JezlvcXnXL87ExnzQgOy5duxEZkEzvVGvamLnIEO0rtaKj_HsG1saFCQ8JNzV4NmH-GGCmVXhx50yJyuo4PPgeFRLBLDM8cTFJXGS3-Ftn0aBQr1_nEyzto-cggqNmRytR-ziQE17mET8xQkvyc3EBLy5C5a6LM4fUgNFAEMeJMn-YV_S2BlljE5i1vaFhoZ90aIOxG_pRaZxasPFsBgWaXiL0_BZ5Ho7MfqaXv-kKZTNlyi56Yci' },
  drinks:     { ar:'مشروبات',      en:'Drinks',      emoji:'🥤', img:'https://lh3.googleusercontent.com/aida-public/AB6AXuBLN9U1S397cdlmVGSNHEQCHaL9N_5paOTEzFoFGUyiZDJ82jgLIBb0WRK9FESRpiRJDctydLyseK_3tA5XzkCtAAUuU-G9dHVxqauknv-r51cKl2Q7Dio4d24ep51fZSbi0PWMrrloWDI0VgFzVEn1bSMkY0wA-K8C1Y0ms3oL6GFoq9j3ydDjvTKOdwtgnlrBbRC0pU7uuSCNAo8hHAJrmQ5UBXxUQ8D9ZHToYEzaXbJlvn-9fhdGnGfiZNEkt4hpib0S56_NgjTA' },
  desserts:   { ar:'حلويات',       en:'Desserts',    emoji:'🍮', img:'https://lh3.googleusercontent.com/aida-public/AB6AXuBlX7fJZ1kCgpLg1pzQc0cGqBcR44UqHKQluoJ_Y2mE7MPu-z9JDIJkMzhInXx93F8PVtp0uuBHUSeIY5lnhvfl5HCAvApwp7eOMnvCB6JrJiBRCUeRBGOlrf3Ik3RkD4-bbN-AcBZ-7ik924h2WmTk96ZghPzwnV1n1x6WQQHOHVFW9uCRic0Jipr4Z6fFcVSxUjCD4noSGTE9sEn0AkxjzlyoQ96ow2fJLREnwFgvd-kbQl3CNB1TnRER7dioKFCjZs1UZrshoH5L' }
};

let activeCat = new URLSearchParams(window.location.search).get('cat') || 'all';
const API_BASE = getApiBase();

async function loadItemsFromApi() {
  try {
    const [items, categories] = await Promise.all([
      fetch(API_BASE + '/api/items').then(r => r.ok ? r.json() : []),
      fetch(API_BASE + '/api/categories').then(r => r.ok ? r.json() : [])
    ]);
    if (items && items.length) localStorage.setItem('wh_items', JSON.stringify(items));
    if (categories && categories.length) localStorage.setItem('wh_categories', JSON.stringify(categories));
    renderItems();
  } catch (err) {
    console.error(err);
  }
}

function applyLanguage(lang) {
  const html = document.documentElement;
  const langText = document.getElementById('lang-text');
  if (lang === 'ar') {
    html.setAttribute('dir','rtl'); html.setAttribute('lang','ar');
    if (langText) langText.innerText = 'AR';
    currentLang = 'ar';
  } else {
    html.setAttribute('dir','ltr'); html.setAttribute('lang','en');
    if (langText) langText.innerText = 'EN';
    currentLang = 'en';
  }
  localStorage.setItem('lang', lang);
  renderTabs();
  renderItems();
}

function toggleLanguage() {
  applyLanguage(currentLang === 'ar' ? 'en' : 'ar');
}

function renderTabs() {
  const keys = ['all','grill','sandwiches','appetizers','drinks','desserts'];
  document.getElementById('cat-tabs').innerHTML = keys.map(k => {
    const isActive = activeCat === k;
    const cat = CATS[k];
    return `
    <div class="cat-card flex-shrink-0 flex flex-col items-center gap-1.5 pb-2 ${isActive?'active':''}"
         onclick="selectCat('${k}')" style="min-width:80px; max-width:100px">
      <!-- Image circle -->
      <div class="cat-img-wrap w-16 h-16 rounded-xl overflow-hidden border-2 ${isActive?'border-[#4CAF50]':'border-gray-200'} transition-all">
        ${cat.img
          ? `<img src="${cat.img}" class="w-full h-full object-cover" alt="${cat[currentLang]}"/>`
          : `<div class="w-full h-full bg-green-50 flex items-center justify-center text-2xl">${cat.emoji}</div>`}
      </div>
      <!-- Emoji icon (like in reference image) -->
      <div class="flex flex-col items-center gap-0.5">
        <span class="text-base leading-none">${cat.emoji}</span>
        <span class="cat-name text-xs font-bold text-center leading-tight ${isActive?'text-[#4CAF50]':'text-[#1b1c1a]'}">${cat[currentLang]}</span>
      </div>
      <!-- Active underline -->
      <div class="cat-underline h-0.5 w-full rounded-full mt-0.5 transition-all ${isActive?'bg-[#4CAF50]':'bg-transparent'}"></div>
    </div>`;
  }).join('');
}

function selectCat(cat) {
  activeCat = cat;
  history.replaceState(null,'', cat==='all' ? 'category.html' : 'category.html?cat='+cat);
  renderTabs();
  renderItems();
  // Scroll the selected tab into view
  const tabs = document.getElementById('cat-tabs');
  const idx = ['all','grill','sandwiches','appetizers','drinks','desserts'].indexOf(cat);
  if (tabs.children[idx]) tabs.children[idx].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function getNormalizedCategory(cat) {
  if (cat === 'chicken' || cat === 'meat') return 'grill';
  if (cat === 'carbs') return 'appetizers';
  return cat;
}

function renderItems() {
  const allItems = JSON.parse(localStorage.getItem('wh_items') || '[]');
  const filtered = activeCat === 'all'
    ? allItems.filter(i => i.visible !== false)
    : allItems.filter(i => getNormalizedCategory(i.category) === activeCat && i.visible !== false);

  const title = document.getElementById('cat-title');
  const count = document.getElementById('item-count');
  const grid  = document.getElementById('items-grid');

  title.textContent = CATS[activeCat]?.[currentLang] || '';
  count.textContent = currentLang==='ar' ? filtered.length+' صنف' : filtered.length+' items';

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="col-span-full text-center py-20 text-gray-400">
        <div class="text-6xl mb-4">🍽️</div>
        <p class="font-bold text-lg">${currentLang==='ar'?'لا توجد أصناف بعد':'No items yet'}</p>
        <p class="text-sm mt-1">${currentLang==='ar'?'أضف أصنافاً من لوحة التحكم':'Add items from the admin panel'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const name  = currentLang==='ar' ? (item.nameAr||item.nameEn) : (item.nameEn||item.nameAr);
    const desc  = currentLang==='ar' ? (item.descAr||item.descEn) : (item.descEn||item.descAr);
    const cat   = CATS[item.category];
    const catLabel = cat ? cat[currentLang] : item.category;
    const basePrice = item.priceMd || item.price;
    const currency  = currentLang==='ar' ? 'ر.س' : 'SAR';

    return `
    <div class="item-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-visible cursor-pointer"
         onclick="openItem(${item.id})">
      <!-- Top image area - NOT circular, full width, light bg -->
      <div class="relative h-44 bg-gray-50 rounded-t-2xl overflow-hidden flex items-center justify-center">
        ${item.img
          ? `<img src="${item.img}" alt="${name}" class="w-full h-full object-cover"/>`
          : `<div class="flex flex-col items-center gap-2 text-gray-300">
               <div class="text-5xl">${cat?.emoji||'🍽️'}</div>
             </div>`}
        <!-- Category badge -->
        <span class="absolute top-3 ${currentLang==='ar'?'right-3':'left-3'} bg-white/90 text-[#4CAF50] text-[10px] font-bold px-2.5 py-1 rounded-full shadow-sm border border-green-100">
          ${cat?.emoji||''} ${catLabel}
        </span>
      </div>

      <!-- Circular image popping out -->
      <div class="flex justify-center" style="margin-top:-32px; position:relative; z-index:10;">
        <div class="w-16 h-16 rounded-full border-4 border-white shadow-md overflow-hidden bg-gray-100">
          ${item.img
            ? `<img src="${item.img}" alt="${name}" class="w-full h-full object-cover"/>`
            : `<div class="w-full h-full bg-green-50 flex items-center justify-center text-2xl">${cat?.emoji||'🍽️'}</div>`}
        </div>
      </div>

      <!-- Content -->
      <div class="px-4 pb-4 pt-2 text-center">
        <h3 class="font-black text-[#1b1c1a] text-[15px] mb-1">${name}</h3>
        ${desc ? `<p class="text-xs text-gray-500 leading-relaxed mb-3 line-clamp-2">${desc}</p>` : '<div class="mb-3"></div>'}

        <!-- Tags row (sizes/portions as tags) -->
        <div class="flex flex-wrap justify-center gap-1.5 mb-3">
          ${item.portions && item.portions.length > 0
            ? item.portions.slice(0,3).map((p,i) =>
                `<span class="inline-block px-2.5 py-0.5 rounded-full text-[11px] font-bold ${i===0?'bg-[#4CAF50] text-white':'bg-green-50 text-[#4CAF50] border border-green-200'}">${p.label}${p.price?' · '+p.price+' ر.س':''}</span>`
              ).join('')
            : `${item.priceSm ? `<span class="inline-block px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-green-50 text-[#4CAF50] border border-green-200">${currentLang==='ar'?'صغير':'Small'}</span>` : ''}
               ${item.priceMd||item.price ? `<span class="inline-block px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-[#4CAF50] text-white">${currentLang==='ar'?'وسط':'Medium'}</span>` : ''}
               ${item.priceLg ? `<span class="inline-block px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-green-50 text-[#4CAF50] border border-green-200">${currentLang==='ar'?'كبير':'Large'}</span>` : ''}`
          }
        </div>

        <!-- Price & Calories -->
        <div class="flex items-center justify-center gap-4 mb-4">
          ${item.cal ? `
          <span class="flex items-center gap-1 text-xs text-orange-400 font-bold">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.66 11.2C17.43 10.9 17.15 10.64 16.89 10.38C16.22 9.78 15.46 9.35 14.82 8.72C13.33 7.26 13 4.85 13.95 3C13 3.23 12.17 3.75 11.46 4.32C8.87 6.4 7.85 10.07 9.07 13.22C9.11 13.32 9.15 13.42 9.15 13.55C9.15 13.77 9 13.97 8.8 14.05C8.57 14.15 8.33 14.09 8.14 13.93C8.08 13.88 8.04 13.83 8 13.76C6.87 12.33 6.69 10.28 7.45 8.64C5.78 10 4.87 12.3 5 14.47C5.06 14.97 5.12 15.47 5.29 15.97C5.43 16.57 5.7 17.17 6 17.7C7.08 19.43 8.95 20.67 10.96 20.92C13.1 21.19 15.39 20.8 17.03 19.32C18.86 17.66 19.5 15 18.56 12.72L18.43 12.46C18.22 12 17.66 11.2 17.66 11.2Z"/></svg>
            ${item.cal} ${currentLang==='ar'?'سعرة':'kcal'}
          </span>` : ''}
          ${basePrice ? `
          <span class="text-[#4CAF50] font-black text-base">
            ${currentLang==='ar' ? `${basePrice} ${currency}` : `${currency} ${basePrice}`}
          </span>` : ''}
        </div>

        <button onclick="event.stopPropagation(); openItem(${item.id})"
          class="w-full py-2.5 bg-[#4CAF50] text-white text-sm font-bold rounded-xl hover:bg-green-600 active:scale-95 transition-all shadow-sm shadow-green-100">
          ${currentLang==='ar' ? 'عرض التفاصيل ←' : 'View Details →'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function openItem(id) {
  localStorage.setItem('wh_current_item', String(id));
  window.location.href = 'item.html';
}
